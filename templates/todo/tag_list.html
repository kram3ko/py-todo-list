{% extends 'base.html' %}

{% block content %}
  <div class="max-w-4xl mx-auto py-6">
    <h2 class="text-2xl font-bold mb-6 text-center">Tags</h2>
    <div class="my-4 text-right">
      <a href="{% url 'todo:tag-create' %}?next={{ request.get_full_path }}"
         class="inline-block px-4 py-2 bg-green-600 text-white text-sm font-medium rounded hover:bg-green-700 transition">
        ➕ Add New Tag
      </a>
    </div>
    {% if tag_list %}
      <div class="overflow-x-auto rounded-lg shadow border border-gray-200">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">#</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Tasks</th>
            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th>
          </tr>
          </thead>
          <tbody class="divide-y divide-gray-200 bg-white">
          {% for tag in tag_list %}
            <tr>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-800">{{ forloop.counter }}</td>
              <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                <a href="{% url 'todo:index' %}?tag={{ tag.pk }}" class="text-blue-600 hover:underline">
                  {{ tag.name }}
                </a>
              </td>
              <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">{{ tag.tasks.count }}</td>
              <td class="px-6 py-4 whitespace-nowrap text-right space-x-2">
                <a href="{% url 'todo:tag-update' tag.pk %}?next={{ request.get_full_path }}"
                   class="px-3 py-1 text-sm bg-blue-500 text-white rounded hover:bg-blue-600">Update</a>
                <a href="{% url 'todo:tag-delete' tag.pk %}?next={{ request.get_full_path }}"
                   class="px-3 py-1 text-sm bg-red-500 text-white rounded hover:bg-red-600">Delete</a>
              </td>
            </tr>
          {% endfor %}
          </tbody>
        </table>
      </div>
    {% else %}
      <p class="text-center text-gray-500 mt-4">No tags available.</p>
    {% endif %}
  </div>
{% endblock %}
