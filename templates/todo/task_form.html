{% extends 'base.html' %}
{% load crispy_forms_filters %}

{% block content %}
  <div class="max-w-xl mx-auto mt-8 p-6 bg-white rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-4 text-center">Create New Task</h2>

    <form method="post" novalidate>
      {% csrf_token %}
      {{ form|crispy }}

      <div class="mt-4 flex justify-end gap-2">
        <button type="submit"
                class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">
          Save
        </button>
        <a href="{{ request.GET.next|default:'/home/' }}" class="px-4 py-2 bg-gray-300 text-gray-800 rounded hover:bg-gray-400 transition">
          Cancel
        </a>
      </div>
    </form>
  </div>
{% endblock %}
