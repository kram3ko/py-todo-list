{% extends 'base.html' %}

{% block title %}Confirm Delete Tag{% endblock %}

{% block content %}
  <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
    <h1 class="text-xl font-bold mb-4">Confirm Deletion</h1>
    <p class="mb-4">Are you sure you want to delete the tag: <strong>{{ object.name }}</strong>?</p>
    <div class="flex gap-2">
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600">Delete</button>
      </form>
      <a href="{{ request.GET.next }}" class="px-3 py-1 bg-gray-300 text-gray-800 rounded hover:bg-gray-400">Cancel</a>
    </div>
  </div>
{% endblock %}
