{% extends 'base.html' %}
{% load crispy_forms_filters %}

{% block title %}Add Tag{% endblock %}

{% block content %}
  <div class="max-w-md mx-auto bg-white p-4 rounded shadow">
    <h1 class="text-xl font-bold mb-4">Add Tag</h1>
    <form method="post">
      {% csrf_token %}
      {{ form|crispy }}
      <div class="mt-3 flex gap-2">
        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Save</button>
        <a href="{{ request.GET.next }}" class="px-4 py-2 bg-gray-300 text-gray-800 rounded hover:bg-gray-400">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
