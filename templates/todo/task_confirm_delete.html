{% extends 'base.html' %}

{% block content %}
  <div class="max-w-md mx-auto mt-20 bg-white p-6 rounded-lg shadow-lg text-center">
    <h2 class="text-2xl font-bold mb-4 text-red-600">Confirm Delete</h2>
    <p class="mb-6 text-gray-700">Are you sure you want to delete this task?</p>
    <p class="mb-4 font-medium text-lg text-gray-900">"{{ object.content }}"</p>

    <form method="post" class="flex justify-center gap-4">
      {% csrf_token %}
      <button type="submit"
              class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition">
        Yes, Delete
      </button>
      <a href="{{ request.GET.next|default:'/' }}"
         class="px-4 py-2 bg-gray-300 text-gray-800 rounded hover:bg-gray-400 transition">
        Cancel
      </a>
    </form>
  </div>
{% endblock %}
